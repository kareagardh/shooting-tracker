name: shooting_tracker
description: Track shooting range results with GPS and photos.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  geolocator: ^13.0.0
  image_picker: ^1.1.2
  path_provider: ^2.1.4
  intl: ^0.20.2
  uuid: ^4.5.1
  permission_handler: ^11.3.1
  archive: ^3.6.1
  share_plus: ^10.0.2
  file_picker: ^8.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon_1024.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0D1117"
  adaptive_icon_foreground: "assets/icons/app_icon_1024.png"

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
